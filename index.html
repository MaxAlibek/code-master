<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeMaster | Elite Engineering Path</title>
    <meta name="description" content="Digital Revolution Makers (DRM) — Premium EdTech platform for training elite software engineers. Real tools, AI mentorship, and production-grade workflows." />
    <script>
      (function () {
        var key = 'codemaster_theme';
        var stored = localStorage.getItem(key);
        var theme = (stored === 'dark' || stored === 'light')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        var root = document.documentElement;
        root.dataset.theme = theme;
        if (theme === 'dark') root.classList.add('dark');
        else root.classList.remove('dark');
        root.style.backgroundColor = theme === 'dark' ? '#000000' : '#F5F5F7';
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <style>
      html, body { margin: 0; min-height: 100%; }
      html.dark, html[data-theme='dark'] { background: #000000; }
      body { background: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
